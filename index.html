<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ledj__</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: #09070f; /* Deep, near-black purple */
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container for the background canvas */
        .dot-field-container {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        #bgCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        /* Profile Card Container */
        .profile-card {
            background: rgba(15, 12, 22, 0.7);
            border: 1px solid rgba(138, 43, 226, 0.2);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 16px;
            width: 350px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            z-index: 2;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
            border-color: rgba(138, 43, 226, 0.5);
        }

        /* Profile Picture Placeholder */
        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 2px solid #8a2be2;
            margin-bottom: 1rem;
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.5);
        }

        /* Typography */
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 0.2rem;
            background: linear-gradient(45deg, #ffffff, #b983ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #a19da7;
            margin-bottom: 1.5rem;
        }

        /* Social Links / Buttons */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(25, 20, 35, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0.8rem;
            border-radius: 8px;
            color: #ffffff;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }

        .btn:hover {
            background: #8a2be2;
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.6);
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="dot-field-container">
        <canvas id="bgCanvas"></canvas>
    </div>

    <div class="profile-card">
        <img src="https://api.dicebear.com/7.x/identicon/svg?seed=ledj" alt="Avatar" class="avatar">
        
        <h1>ledj</h1>
        <p class="subtitle">@ledj__</p>

        <div class="links-container">
            <div class="btn" onclick="copyDiscord()">
                <i class="fab fa-discord"></i>
                <span id="discord-text">ledj__</span>
            </div>
            
            <a href="#" class="btn">
                <i class="fa-solid fa-code"></i>
                <span>Projects</span>
            </a>
        </div>
    </div>

    <script>
        // --- Discord Copy Functionality ---
        function copyDiscord() {
            const discordName = "ledj__";
            navigator.clipboard.writeText(discordName).then(() => {
                const btnText = document.getElementById("discord-text");
                btnText.innerText = "Copied!";
                setTimeout(() => {
                    btnText.innerText = discordName;
                }, 2000);
            });
        }

        // --- Interactive Dot Field Implementation ---
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d', { alpha: true });

        // Configuration matching your React props settings
        const config = {
            dotRadius: 1.5,
            dotSpacing: 14,
            cursorRadius: 500,
            cursorForce: 0.1,
            bulgeOnly: true,
            bulgeStrength: 67,
            sparkle: false,
            waveAmplitude: 0,
            gradientFrom: 'rgba(168, 85, 247, 0.35)',
            gradientTo: 'rgba(180, 151, 207, 0.25)',
        };

        const TWO_PI = Math.PI * 2;
        let dots = [];
        let mouse = { x: -9999, y: -9999, prevX: -9999, prevY: -9999, speed: 0 };
        let size = { w: 0, h: 0, offsetX: 0, offsetY: 0 };
        let engagement = 0;
        let frameCount = 0;
        const dpr = Math.min(window.devicePixelRatio || 1, 2);

        function doResize() {
            const rect = canvas.parentElement.getBoundingClientRect();
            size.w = rect.width;
            size.h = rect.height;

            canvas.width = size.w * dpr;
            canvas.height = size.h * dpr;
            canvas.style.width = `${size.w}px`;
            canvas.style.height = `${size.h}px`;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

            size.offsetX = rect.left + window.scrollX;
            size.offsetY = rect.top + window.scrollY;

            buildDots(size.w, size.h);
        }

        function buildDots(w, h) {
            const step = config.dotRadius + config.dotSpacing;
            const cols = Math.floor(w / step);
            const rows = Math.floor(h / step);
            const padX = (w % step) / 2;
            const padY = (h % step) / 2;
            dots = new Array(rows * cols);
            let idx = 0;

            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    const ax = padX + col * step + step / 2;
                    const ay = padY + row * step + step / 2;
                    dots[idx++] = { ax, ay, sx: ax, sy: ay, vx: 0, vy: 0, x: ax, y: ay };
                }
            }
        }

        function updateMouseSpeed() {
            const dx = mouse.prevX - mouse.x;
            const dy = mouse.prevY - mouse.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            mouse.speed += (dist - mouse.speed) * 0.5;
            if (mouse.speed < 0.001) mouse.speed = 0;
            mouse.prevX = mouse.x;
            mouse.prevY = mouse.y;
        }

        setInterval(updateMouseSpeed, 20);

        function tick() {
            frameCount++;
            const { w, h } = size;
            const len = dots.length;
            const t = frameCount * 0.02;

            const targetEngagement = Math.min(mouse.speed / 5, 1);
            engagement += (targetEngagement - engagement) * 0.06;
            if (engagement < 0.001) engagement = 0;

            ctx.clearRect(0, 0, w, h);

            if (w === 0 || h === 0) {
                requestAnimationFrame(tick);
                return;
            }

            const grad = ctx.createLinearGradient(0, 0, w, h);
            grad.addColorStop(0, config.gradientFrom);
            grad.addColorStop(1, config.gradientTo);
            ctx.fillStyle = grad;

            const cr = config.cursorRadius;
            const crSq = cr * cr;
            const rad = config.dotRadius / 2;
            const isBulge = config.bulgeOnly;

            ctx.beginPath();

            for (let i = 0; i < len; i++) {
                const d = dots[i];
                if (!d) continue;
                const dx = mouse.x - d.ax;
                const dy = mouse.y - d.ay;
                const distSq = dx * dx + dy * dy;

                if (distSq < crSq && engagement > 0.01) {
                    const dist = Math.sqrt(distSq);
                    if (isBulge) {
                        const factor = 1 - dist / cr;
                        const push = factor * factor * config.bulgeStrength * engagement;
                        const angle = Math.atan2(dy, dx);
                        d.sx += (d.ax - Math.cos(angle) * push - d.sx) * 0.15;
                        d.sy += (d.ay - Math.sin(angle) * push - d.sy) * 0.15;
                    } else {
                        const angle = Math.atan2(dy, dx);
                        const move = (500 / dist) * (mouse.speed * config.cursorForce);
                        d.vx += Math.cos(angle) * -move;
                        d.vy += Math.sin(angle) * -move;
                    }
                } else if (isBulge) {
                    d.sx += (d.ax - d.sx) * 0.1;
                    d.sy += (d.ay - d.sy) * 0.1;
                }

                if (!isBulge) {
                    d.vx *= 0.9;
                    d.vy *= 0.9;
                    d.x = d.ax + d.vx;
                    d.y = d.ay + d.vy;
                    d.sx += (d.x - d.sx) * 0.1;
                    d.sy += (d.y - d.sy) * 0.1;
                }

                let drawX = d.sx;
                let drawY = d.sy;
                if (config.waveAmplitude > 0) {
                    drawY += Math.sin(d.ax * 0.03 + t) * config.waveAmplitude;
                    drawX += Math.cos(d.ay * 0.03 + t * 0.7) * config.waveAmplitude * 0.5;
                }

                if (config.sparkle) {
                    const hash = ((i * 2654435761) ^ (frameCount >> 3)) >>> 0;
                    if ((hash % 100) < 3) {
                        ctx.moveTo(drawX + rad * 1.8, drawY);
                        ctx.arc(drawX, drawY, rad * 1.8, 0, TWO_PI);
                    } else {
                        ctx.moveTo(drawX + rad, drawY);
                        ctx.arc(drawX, drawY, rad, 0, TWO_PI);
                    }
                } else {
                    ctx.moveTo(drawX + rad, drawY);
                    ctx.arc(drawX, drawY, rad, 0, TWO_PI);
                }
            }

            ctx.fill();
            requestAnimationFrame(tick);
        }

        // Event listeners
        window.addEventListener('resize', () => {
            clearTimeout(window.resizeTimer);
            window.resizeTimer = setTimeout(doResize, 100);
        });

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.pageX - size.offsetX;
            mouse.y = e.pageY - size.offsetY;
        }, { passive: true });

        // Initialize background physics
        doResize();
        requestAnimationFrame(tick);
    </script>
</body>
</html>
